<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nigiwai Executive Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  /* ── Variables ───────────────────────────── */
  :root {
    --navy:  #0D1B2A;
    --navy2: #1E3A5F;
    --gold:  #C9A84C;
    --gold2: #E8C97A;
    --black: #080C10;
    --text:  #E8E2D5;
    --muted: #8A8070;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background-color: var(--black);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background ──────────────────────────── */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(201,168,76,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .bg-glow {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse 80% 50% at 50% -10%,
      rgba(30,58,95,.45) 0%, transparent 70%);
  }

  /* ── Header ─────────────────────────────── */
  header {
    position: relative; z-index: 10;
    border-bottom: 1px solid rgba(201,168,76,.15);
    background: linear-gradient(180deg, rgba(8,12,16,.95) 0%, rgba(13,27,42,.8) 100%);
    backdrop-filter: blur(12px);
  }
  .logo-text {
    font-family: 'Cinzel', serif;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: .12em;
  }
  .gold-line {
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* ── Card ────────────────────────────────── */
  .module-card {
    position: relative; overflow: hidden;
    background: linear-gradient(135deg,
      rgba(13,27,42,.9) 0%,
      rgba(8,12,16,.95) 100%);
    border: 1px solid rgba(201,168,76,.12);
    border-radius: 12px;
    transition: transform .35s cubic-bezier(.23,1,.32,1),
                border-color .35s ease,
                box-shadow .35s ease;
    cursor: pointer;
    text-decoration: none;
    display: block;
  }
  .module-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg,
      rgba(201,168,76,.06) 0%, transparent 60%);
    opacity: 0;
    transition: opacity .35s ease;
  }
  .module-card:hover { transform: translateY(-6px) scale(1.01); }
  .module-card:hover::before { opacity: 1; }
  .module-card:hover { border-color: rgba(201,168,76,.35); }

  .card-glow {
    position: absolute; top: -40px; right: -40px;
    width: 120px; height: 120px; border-radius: 50%;
    opacity: .15;
    filter: blur(40px);
    transition: opacity .35s ease;
  }
  .module-card:hover .card-glow { opacity: .35; }

  .icon-wrap {
    width: 52px; height: 52px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    border: 1px solid rgba(255,255,255,.08);
    flex-shrink: 0;
  }

  /* ── Shimmer Skeleton ────────────────────── */
  @keyframes shimmer {
    0%   { background-position: -600px 0; }
    100% { background-position: 600px 0; }
  }
  .skeleton {
    background: linear-gradient(90deg,
      rgba(255,255,255,.04) 0%,
      rgba(255,255,255,.09) 50%,
      rgba(255,255,255,.04) 100%);
    background-size: 600px 100%;
    animation: shimmer 1.6s infinite;
    border-radius: 8px;
  }

  /* ── Stagger animation ───────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card-appear {
    opacity: 0;
    animation: fadeUp .55s cubic-bezier(.23,1,.32,1) forwards;
  }

  /* ── Scrollbar ───────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--navy2); border-radius: 3px; }

  /* ── Toast ───────────────────────────────── */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: var(--navy2);
    border: 1px solid rgba(201,168,76,.3);
    color: var(--text); padding: 12px 20px; border-radius: 8px;
    font-size: .875rem; opacity: 0; transform: translateY(8px);
    transition: all .3s ease; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- Backgrounds -->
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<!-- ── HEADER ──────────────────────────────────────── -->
<header class="sticky top-0">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <!-- Logo -->
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 rounded-lg flex items-center justify-center"
           style="background:linear-gradient(135deg,#1E3A5F,#0D1B2A);border:1px solid rgba(201,168,76,.3)">
        <i class="fa-solid fa-wave-square text-sm" style="color:var(--gold)"></i>
      </div>
      <div>
        <div class="logo-text text-xl font-bold tracking-widest">NIGIWAI</div>
        <div class="text-xs tracking-[.25em] uppercase" style="color:var(--muted)">Executive Portal</div>
      </div>
    </div>

    <!-- Right actions -->
    <div class="flex items-center gap-3">
      <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-full text-xs"
           style="background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.15);color:var(--gold)">
        <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
        Live
      </div>
      <a href="admin.html"
         class="px-4 py-2 rounded-lg text-sm font-medium transition-all"
         style="background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);color:var(--gold)"
         onmouseover="this.style.background='rgba(201,168,76,.2)'"
         onmouseout="this.style.background='rgba(201,168,76,.1)'">
        <i class="fa-solid fa-shield-halved mr-1.5"></i>Admin
      </a>
    </div>
  </div>
  <div class="gold-line"></div>
</header>

<!-- ── HERO ────────────────────────────────────────── -->
<section class="relative z-10 text-center py-16 px-6">
  <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs mb-6"
       style="background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.15);color:var(--gold)">
    <i class="fa-solid fa-building-columns"></i>
    <span style="font-family:'Cinzel',serif;letter-spacing:.15em">Nigiwai Group</span>
  </div>
  <h1 class="logo-text text-4xl md:text-6xl font-bold mb-4" style="font-family:'Cinzel',serif">
    Executive Portal
  </h1>
  <p class="text-sm md:text-base max-w-xl mx-auto leading-relaxed" style="color:var(--muted)">
    ศูนย์กลางข้อมูลและระบบบริหารงานของ Nigiwai Group<br class="hidden sm:block"/>
    เข้าถึงทุก Dashboard ได้จากที่เดียว
  </p>
</section>

<!-- ── MODULE GRID ──────────────────────────────────── -->
<main class="relative z-10 max-w-7xl mx-auto px-6 pb-20">
  <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
    <!-- Skeleton placeholders -->
    <div id="skeletons" class="contents">
      <script>
        document.write([...Array(8)].map(() => `
          <div class="module-card p-5" style="cursor:default">
            <div class="skeleton h-12 w-12 rounded-xl mb-4"></div>
            <div class="skeleton h-4 w-3/4 mb-2"></div>
            <div class="skeleton h-3 w-full mb-1"></div>
            <div class="skeleton h-3 w-5/6"></div>
          </div>`).join(''));
      </script>
    </div>
  </div>
  <div id="empty" class="hidden text-center py-20" style="color:var(--muted)">
    <i class="fa-regular fa-folder-open text-4xl mb-4 block"></i>
    <p>ยังไม่มีโมดูลในระบบ<br/>
      <a href="admin.html" style="color:var(--gold)">→ ไปที่หน้า Admin</a> เพื่อเพิ่มโมดูล
    </p>
  </div>
</main>

<!-- ── FOOTER ───────────────────────────────────────── -->
<footer class="relative z-10 text-center pb-8 text-xs" style="color:var(--muted)">
  <div class="gold-line mb-6"></div>
  © <span id="yr"></span> Nigiwai Group — All rights reserved
</footer>

<!-- Toast -->
<div id="toast"></div>

<!-- ─────────────────────────────────────────────────── -->
<script>
  // ╔══════════════════════════════════════╗
  // ║   ⚙️  CONFIGURATION — แก้ตรงนี้     ║
  // ╚══════════════════════════════════════╝
  const SUPABASE_URL = 'https://qktqbiurepifkmsggehf.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFrdHFiaXVyZXBpZmttc2dnZWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzE5MTQsImV4cCI6MjA4OTU0NzkxNH0.5_BxRgdi4AvkqENmPf4T5mCM01DtVGL9XQwVhXxonpE';
  // ───────────────────────────────────────

  document.getElementById('yr').textContent = new Date().getFullYear();

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function toast(msg, ok = true) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.borderColor = ok ? 'rgba(201,168,76,.3)' : 'rgba(239,68,68,.4)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function hexToRgb(hex) {
    const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return r ? `${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}` : '201,168,76';
  }

  function renderCards(modules) {
    const grid = document.getElementById('grid');
    document.getElementById('skeletons').remove();

    if (!modules.length) {
      document.getElementById('empty').classList.remove('hidden');
      return;
    }

    modules.forEach((m, i) => {
      const rgb = hexToRgb(m.color || '#C9A84C');
      const card = document.createElement('a');
      card.href = m.url || '#';
      if (m.url && m.url !== '#') card.target = '_blank';
      card.rel = 'noopener noreferrer';
      card.className = 'module-card card-appear p-5';
      card.style.animationDelay = `${i * 70}ms`;
      card.style.boxShadow = `0 0 0 0 rgba(${rgb},.0)`;
      card.innerHTML = `
        <div class="card-glow" style="background:rgba(${rgb},1)"></div>
        <div class="flex items-start gap-4 mb-4">
          <div class="icon-wrap" style="background:rgba(${rgb},.12);color:rgba(${rgb},1)">
            <i class="fa-solid ${m.icon || 'fa-link'}"></i>
          </div>
          <div class="flex-1 min-w-0 pt-1">
            <div class="font-semibold text-base leading-snug" style="color:#E8E2D5">${m.title}</div>
          </div>
        </div>
        <p class="text-sm leading-relaxed mb-4" style="color:var(--muted)">${m.description || ''}</p>
        <div class="flex items-center gap-1.5 text-xs font-medium" style="color:rgba(${rgb},1)">
          เข้าสู่ระบบ <i class="fa-solid fa-arrow-right text-xs"></i>
        </div>
        <div class="absolute bottom-0 left-0 right-0 h-0.5 opacity-0 transition-opacity duration-300"
             style="background:linear-gradient(90deg,transparent,rgba(${rgb},.6),transparent)"
             data-underline></div>`;
      card.addEventListener('mouseenter', () => {
        card.querySelector('[data-underline]').style.opacity = '1';
        card.style.boxShadow = `0 8px 40px rgba(${rgb},.15), 0 2px 8px rgba(0,0,0,.4)`;
      });
      card.addEventListener('mouseleave', () => {
        card.querySelector('[data-underline]').style.opacity = '0';
        card.style.boxShadow = '0 0 0 0 transparent';
      });
      grid.appendChild(card);
    });
  }

  async function loadModules() {
    try {
      const { data, error } = await sb
        .from('dashboard_modules')
        .select('*')
        .eq('is_active', true)
        .order('order_index', { ascending: true });

      if (error) throw error;
      renderCards(data || []);
    } catch (err) {
      console.error(err);
      document.getElementById('skeletons').remove();
      document.getElementById('empty').classList.remove('hidden');
      toast('ไม่สามารถโหลดข้อมูลได้: ' + err.message, false);
    }
  }

  loadModules();

  // Real-time updates
  sb.channel('modules')
    .on('postgres_changes',
      { event: '*', schema: 'public', table: 'dashboard_modules' },
      () => {
        document.getElementById('grid').innerHTML = '';
        loadModules();
        toast('ข้อมูลอัปเดตแล้ว');
      })
    .subscribe();
</script>
</body>
</html>
