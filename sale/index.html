<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue Dashboard Pro v2.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .gradient-header { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="gradient-header p-4 shadow-2xl text-white">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">📈</span>
                <div>
                    <h1 class="text-xl font-bold leading-none">Dashboard Pro</h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">Real-time Revenue Tracker</p>
                </div>
            </div>
            <div id="statusBadge" class="flex items-center gap-2 bg-slate-700/50 px-4 py-2 rounded-full border border-slate-600">
                <div class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></div>
                <span class="text-xs font-medium">Initializing...</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-card p-8 rounded-3xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-sm font-semibold mb-1">ยอดขายรวมสุทธิ</p>
                <h2 id="totalRevenue" class="text-4xl font-bold text-indigo-600">฿0.00</h2>
            </div>
            <div class="glass-card p-8 rounded-3xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-sm font-semibold mb-1">จำนวนรายการทั้งหมด</p>
                <h2 id="orderCount" class="text-4xl font-bold text-slate-800">0</h2>
            </div>
            <div class="glass-card p-8 rounded-3xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-sm font-semibold mb-1">อัปเดตข้อมูลล่าสุด</p>
                <h2 id="updateTime" class="text-xl font-bold text-slate-600 mt-2">-</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-8">
            <div class="glass-card p-8 rounded-3xl shadow-lg border border-slate-200">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                    <div>
                        <h3 class="text-xl font-bold text-slate-800">แนวโน้มรายรับ (Revenue Trend)</h3>
                        <p class="text-sm text-slate-500">ข้อมูลจาก Column J (รายรับ) ใน Google Sheet</p>
                    </div>
                    <button onclick="fetchData()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-xl transition shadow-md active:scale-95">
                        Refresh Data
                    </button>
                </div>
                <div class="relative h-[450px]">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 1. ตรวจสอบ URL ของคุณ (ใช้ตัวล่าสุดที่คุณส่งมา)
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR0EgLY6BXgMakGncUtRNx3XjecAc0mKqDb7rLGrPBknG1W1CjNTC8is9ibUjJIThVCfal-1mOJNeKq/pub?gid=303701821&single=true&output=csv';

        let chart;

        function fetchData() {
            const badge = document.getElementById('statusBadge');
            badge.innerHTML = `<div class="w-2 h-2 rounded-full bg-blue-400 animate-spin"></div><span class="text-xs">Syncing...</span>`;

            Papa.parse(SHEET_URL, {
                download: true,
                header: false,
                skipEmptyLines: true,
                complete: function(results) {
                    console.log("Data Received Successfully");
                    // พ่นข้อมูลออกมาดูที่ Console (F12) เพื่อเช็กพิกัด
                    console.table(results.data.slice(0, 20)); 
                    processData(results.data);
                },
                error: function(err) {
                    console.error("Error:", err);
                    badge.innerHTML = `<div class="w-2 h-2 rounded-full bg-red-500"></div><span class="text-xs text-red-500">Error!</span>`;
                }
            });
        }

        function processData(rawData) {
            let labels = [];
            let values = [];
            let total = 0;

            // วนลูปข้อมูล (ข้าม 7 แถวแรกที่เป็นหัวตาราง)
            rawData.forEach((row, index) => {
                if (index >= 7) { 
                    // ดึงข้อมูล Column B (วันที่ - Index 1) และ Column J (รายรับ - Index 9)
                    const rawDate = row[1] || `รายการที่ ${index - 6}`;
                    const rawIncome = row[9]; // Column J คือตำแหน่งที่ 10 (Index 9)

                    if (rawIncome) {
                        // ทำความสะอาดตัวเลข: ลบ ฿, ลบ Comma, ลบช่องว่าง
                        const cleanValue = rawIncome.toString().replace(/[฿,\s]/g, '');
                        const income = parseFloat(cleanValue);

                        if (!isNaN(income) && income > 0) {
                            total += income;
                            labels.push(rawDate);
                            values.push(income);
                        }
                    }
                }
            });

            // อัปเดต UI
            document.getElementById('totalRevenue').innerText = '฿' + total.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('orderCount').innerText = values.length.toLocaleString() + ' รายการ';
            document.getElementById('updateTime').innerText = new Date().toLocaleTimeString('th-TH');
            
            const badge = document.getElementById('statusBadge');
            badge.innerHTML = `<div class="w-2 h-2 rounded-full bg-green-500"></div><span class="text-xs">Live Connected</span>`;

            renderChart(labels, values);
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            
            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'รายรับ (บาท)',
                        data: data,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.05)',
                        borderWidth: 3,
                        pointRadius: 4,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#6366f1',
                        pointHoverRadius: 8,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            padding: 12,
                            titleFont: { size: 14 },
                            callbacks: {
                                label: (ctx) => ` รายรับ: ฿${ctx.parsed.y.toLocaleString()}`
                            }
                        }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true,
                            grid: { color: '#f1f5f9' },
                            ticks: { callback: v => '฿' + v.toLocaleString() }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // เริ่มต้นการทำงาน
        fetchData();
        // รีเฟรชอัตโนมัติทุก 5 นาที
        setInterval(fetchData, 300000);
    </script>
</body>
</html>
