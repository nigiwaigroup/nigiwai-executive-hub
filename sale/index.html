<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="gradient-bg p-4 shadow-xl text-white">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span>📊</span> Revenue Analytics
            </h1>
            <div id="statusBadge" class="text-xs bg-white/20 px-3 py-1 rounded-full border border-white/30">
                Checking connection...
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-indigo-600">
                <p class="text-gray-400 text-sm font-semibold uppercase tracking-wider">รายได้สุทธิ</p>
                <h2 id="totalRevenue" class="text-3xl font-bold text-gray-800">฿0.00</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-purple-500">
                <p class="text-gray-400 text-sm font-semibold uppercase tracking-wider">จำนวนออร์เดอร์</p>
                <h2 id="orderCount" class="text-3xl font-bold text-gray-800">0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-pink-500">
                <p class="text-gray-400 text-sm font-semibold uppercase tracking-wider">ข้อมูล ณ เวลา</p>
                <h2 id="updateTime" class="text-xl font-bold text-gray-600 mt-2">-</h2>
            </div>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-lg border border-gray-100">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-gray-800">Income Visualization</h3>
                <button onclick="loadData()" class="text-indigo-600 hover:text-indigo-800 font-semibold text-sm">Refresh Now ↻</button>
            </div>
            <div class="relative h-[450px]">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // URL ที่คุณให้มา (ตรวจสอบแล้วว่าถูกต้อง)
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR0EgLY6BXgMakGncUtRNx3XjecAc0mKqDb7rLGrPBknG1W1CjNTC8is9ibUjJIThVCfal-1mOJNeKq/pub?gid=303701821&single=true&output=csv';

        let chartInstance = null;

        function loadData() {
            const badge = document.getElementById('statusBadge');
            badge.innerText = "Syncing Data...";
            badge.className = "text-xs bg-yellow-400 text-yellow-900 px-3 py-1 rounded-full animate-pulse";

            // ใช้ PapaParse โหลดข้อมูลโดยตรงจาก URL
            Papa.parse(CSV_URL, {
                download: true,
                header: false, // เราจะจัดการ Row เองเพราะไฟล์มีหลายหัวข้อ
                complete: function(results) {
                    processSheetData(results.data);
                    badge.innerText = "● Live Data Connected";
                    badge.className = "text-xs bg-green-500 text-white px-3 py-1 rounded-full";
                },
                error: function(err) {
                    console.error("PapaParse Error:", err);
                    badge.innerText = "✕ Connection Error";
                    badge.className = "text-xs bg-red-500 text-white px-3 py-1 rounded-full";
                }
            });
        }

        function processSheetData(data) {
            let labels = [];
            let values = [];
            let total = 0;

            // เริ่มอ่านตั้งแต่ Row ที่ 8 (Index 7) เป็นต้นไป
            // Column B (Index 1) = วันที่
            // Column J (Index 9) = รายรับ
            data.slice(7).forEach((row) => {
                if (row[9]) {
                    // กำจัดเครื่องหมาย ฿ และ , ออกจากตัวเลขเพื่อให้คำนวณได้
                    const amount = parseFloat(row[9].replace(/[฿,]/g, ''));
                    const dateLabel = row[1] || 'No Date';

                    if (!isNaN(amount) && amount > 0) {
                        total += amount;
                        labels.push(dateLabel);
                        values.push(amount);
                    }
                }
            });

            // Update UI
            document.getElementById('totalRevenue').innerText = '฿' + total.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('orderCount').innerText = values.length.toLocaleString();
            document.getElementById('updateTime').innerText = new Date().toLocaleTimeString('th-TH');

            updateChart(labels, values);
        }

        function updateChart(labels, data) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'รายรับต่อรายการ',
                        data: data,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 4,
                        pointRadius: 4,
                        pointBackgroundColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            beginAtZero: true,
                            ticks: { callback: v => '฿' + v.toLocaleString() }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        // เริ่มโหลดข้อมูลครั้งแรก
        loadData();
        // รีเฟรชทุก 1 นาที
        setInterval(loadData, 60000);
    </script>
</body>
</html>
