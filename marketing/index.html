<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo Master | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <div id="login-section" class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-indigo-600 tracking-tight">PROMO<span class="text-gray-800">MASTER</span></h1>
                <p class="text-sm text-gray-500 mt-2">Sign in to manage your promotions</p>
            </div>
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="login-email" class="w-full border border-gray-300 px-4 py-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="login-password" class="w-full border border-gray-300 px-4 py-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" required>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-lg hover:bg-indigo-700 transition shadow-md hover:shadow-lg">
                    Sign In to Dashboard
                </button>
                <p id="login-error" class="text-red-500 text-sm text-center hidden"></p>
            </form>
        </div>
    </div>

    <div id="dashboard-section" class="hidden flex-grow flex flex-col">
        <nav class="bg-indigo-700 text-white shadow-md sticky top-0 z-10">
            <div class="container mx-auto px-6 py-4 flex justify-between items-center">
                <h1 class="text-xl font-bold tracking-tight">PROMO<span class="font-light text-indigo-300">MASTER</span></h1>
                <div class="flex items-center gap-4">
                    <span id="user-email" class="text-sm font-medium hidden md:block bg-indigo-800 px-3 py-1 rounded-full"></span>
                    <button onclick="handleLogout()" class="text-sm font-semibold bg-white text-indigo-700 px-4 py-1.5 rounded-lg hover:bg-gray-100 transition shadow-sm">Logout</button>
                </div>
            </div>
        </nav>

        <main class="container mx-auto p-6 max-w-7xl flex-grow">
            
            <section class="glass-panel rounded-2xl shadow-sm border border-gray-200 p-6 mb-8">
                <h2 class="text-xl font-bold mb-6 flex items-center text-gray-800">
                    <span class="bg-indigo-100 text-indigo-600 p-2 rounded-lg mr-3 shadow-inner">⚡</span> 
                    <span id="form-title">Create New Promotion</span>
                </h2>
                <form id="promo-form" class="grid grid-cols-1 md:grid-cols-4 gap-5">
                    <input type="hidden" id="promo-id">
                    
                    <div class="md:col-span-2">
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Promotion Title *</label>
                        <input type="text" id="title" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" required>
                    </div>
                    
                    <div class="md:col-span-2">
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Discount Code</label>
                        <input type="text" id="discount_code" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-mono uppercase">
                    </div>

                    <div class="md:col-span-1">
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Start Date</label>
                        <input type="date" id="start_date" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    
                    <div class="md:col-span-1">
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">End Date</label>
                        <input type="date" id="end_date" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>

                    <div class="md:col-span-2 flex items-center mt-6">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" id="is_active" class="sr-only peer" checked>
                            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500 relative"></div>
                            <span class="ml-3 text-sm font-medium text-gray-700">Active Status (เปิดใช้งาน)</span>
                        </label>
                    </div>

                    <div class="md:col-span-4">
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Description</label>
                        <textarea id="description" rows="2" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                    </div>

                    <div class="md:col-span-4 flex gap-3 pt-2">
                       <button type="submit" class="bg-indigo-600 text-white px-8 py-2.5 rounded-lg hover:bg-indigo-700 transition font-semibold shadow-md">Save Promotion</button>
                       <button type="button" onclick="resetForm()" class="bg-white border border-gray-300 text-gray-700 px-6 py-2.5 rounded-lg hover:bg-gray-50 transition font-medium">Cancel</button>
                    </div>
                </form>
            </section>

            <section>
                <div class="flex justify-between items-center mb-6 border-b pb-3">
                    <h2 class="text-2xl font-bold text-gray-800">All Promotions</h2>
                    <button onclick="fetchPromotions()" class="text-sm font-medium text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded hover:bg-indigo-100 transition">↻ Refresh</button>
                </div>
                
                <div id="loading" class="text-center py-12 text-gray-500 font-medium">Loading data...</div>
                
                <div id="promo-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    </div>
            </section>
        </main>
    </div>

    <script>
        // ================= CONFIGURATION =================
        // ⚠️ เปลี่ยน 2 ค่านี้เป็นของคุณ ⚠️
        const SUPABASE_URL = 'https://mwmcsmoshekavcspsyzt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13bWNzbW9zaGVrYXZjc3BzeXp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MjU3MzQsImV4cCI6MjA5MDAwMTczNH0.j6yCsqoZ1wAT1iw2DC2eBCE_Fuia3MNR6gvVLopQ7UI';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ================= DOM ELEMENTS =================
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const promoForm = document.getElementById('promo-form');
        const promoGrid = document.getElementById('promo-grid');
        const loading = document.getElementById('loading');
        const userEmailSpan = document.getElementById('user-email');
        const formTitle = document.getElementById('form-title');

        // ================= AUTHENTICATION =================
        // เช็คสถานะ Login ทุกครั้งที่เปิดเว็บ
        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                loginSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                userEmailSpan.innerText = session.user.email;
                fetchPromotions(); // ดึงข้อมูลเมื่อ Login ผ่าน
            } else {
                loginSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
            }
        });

        // จัดการการ Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                loginError.innerText = error.message;
                loginError.classList.remove('hidden');
            } else {
                loginError.classList.add('hidden');
            }
        });

        // จัดการการ Logout
        async function handleLogout() {
            await supabase.auth.signOut();
            promoGrid.innerHTML = ''; // ล้างข้อมูลหน้าจอ
        }

        // ================= CRUD OPERATIONS =================
        async function fetchPromotions() {
            loading.classList.remove('hidden');
            promoGrid.innerHTML = '';
            
            const { data, error } = await supabase
                .from('promotions')
                .select('*')
                .order('created_at', { ascending: false });

            loading.classList.add('hidden');
            
            if (error) {
                alert('Error fetching data: ' + error.message);
                return;
            }

            if (data.length === 0) {
                promoGrid.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400">No promotions found. Create one above!</div>`;
                return;
            }

            data.forEach(item => {
                const statusColor = item.is_active ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500';
                const statusText = item.is_active ? 'Active' : 'Inactive';
                const codeDisplay = item.discount_code ? `<span class="bg-indigo-50 border border-indigo-100 text-indigo-700 text-xs px-2 py-1 rounded font-mono font-bold">${item.discount_code}</span>` : '';

                const card = document.createElement('div');
                card.className = "bg-white border border-gray-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition duration-200 flex flex-col h-full";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <span class="${statusColor} text-xs px-2.5 py-1 rounded-full font-bold uppercase tracking-wider">${statusText}</span>
                        <div class="flex gap-3">
                            <button onclick="editPromo('${item.id}')" class="text-blue-500 hover:text-blue-700 transition">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            <button onclick="deletePromo('${item.id}')" class="text-red-400 hover:text-red-600 transition">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                    <h3 class="font-bold text-gray-900 text-lg mb-2 line-clamp-2">${item.title}</h3>
                    <div class="mb-3">${codeDisplay}</div>
                    <p class="text-gray-500 text-sm mb-4 line-clamp-3 flex-grow">${item.description || 'No description provided.'}</p>
                    <div class="border-t border-gray-100 pt-3 flex justify-between items-center text-xs font-medium text-gray-500">
                        <span class="bg-gray-50 px-2 py-1 rounded">Start: ${item.start_date || '-'}</span>
                        <span class="bg-gray-50 px-2 py-1 rounded">End: ${item.end_date || '-'}</span>
                    </div>
                `;
                promoGrid.appendChild(card);
            });
        }

        promoForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('promo-id').value;
            const payload = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                discount_code: document.getElementById('discount_code').value.toUpperCase(),
                start_date: document.getElementById('start_date').value || null,
                end_date: document.getElementById('end_date').value || null,
                is_active: document.getElementById('is_active').checked
            };

            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerText = "Saving...";

            if (id) {
                const { error } = await supabase.from('promotions').update(payload).eq('id', id);
                if (error) alert('Update Failed: ' + error.message);
            } else {
                const { error } = await supabase.from('promotions').insert([payload]);
                if (error) alert('Insert Failed: ' + error.message);
            }

            btn.disabled = false;
            btn.innerText = "Save Promotion";
            resetForm();
            fetchPromotions();
        });

        async function deletePromo(id) {
            if (!confirm('Are you sure you want to delete this promotion? This cannot be undone.')) return;
            const { error } = await supabase.from('promotions').delete().eq('id', id);
            if (error) alert('Delete Failed: ' + error.message);
            fetchPromotions();
        }

        async function editPromo(id) {
            const { data, error } = await supabase.from('promotions').select('*').eq('id', id).single();
            if (data) {
                document.getElementById('promo-id').value = data.id;
                document.getElementById('title').value = data.title;
                document.getElementById('description').value = data.description;
                document.getElementById('discount_code').value = data.discount_code;
                document.getElementById('start_date').value = data.start_date;
                document.getElementById('end_date').value = data.end_date;
                document.getElementById('is_active').checked = data.is_active;
                
                formTitle.innerText = "Edit Promotion";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function resetForm() {
            promoForm.reset();
            document.getElementById('promo-id').value = '';
            document.getElementById('is_active').checked = true;
            formTitle.innerText = "Create New Promotion";
        }
    </script>
</body>
</html>
