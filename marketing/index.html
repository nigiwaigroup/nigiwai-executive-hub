<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo Master Pro | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .loader { border-top-color: #4f46e5; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <div id="login-section" class="flex-grow flex items-center justify-center p-4 bg-slate-100">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md border border-slate-200">
            <div class="text-center mb-10">
                <div class="bg-indigo-600 w-16 h-16 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4">
                    <span class="text-white text-3xl font-bold">P</span>
                </div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Admin Login</h1>
                <p class="text-slate-500 mt-2">Manage your business promotions</p>
            </div>
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                    <input type="email" id="login-email" placeholder="admin@example.com" class="w-full border border-slate-300 px-4 py-3 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" class="w-full border border-slate-300 px-4 py-3 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all" required>
                </div>
                <button type="submit" id="btn-login" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition-all shadow-indigo-200 shadow-lg active:scale-95">
                    Sign In to System
                </button>
                <div id="login-error" class="hidden bg-red-50 text-red-600 p-4 rounded-xl text-sm font-medium text-center border border-red-100"></div>
            </form>
        </div>
    </div>

    <div id="dashboard-section" class="hidden flex-grow flex flex-col">
        <nav class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
            <div class="container mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-1.5 rounded-lg">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight">PROMO<span class="text-indigo-600">MASTER</span></h1>
                </div>
                <div class="flex items-center gap-4">
                    <div class="hidden sm:flex flex-col items-end">
                        <span id="user-email" class="text-sm font-bold text-slate-700"></span>
                        <span class="text-[10px] text-green-500 font-bold uppercase tracking-widest">Administrator</span>
                    </div>
                    <button onclick="handleLogout()" class="bg-slate-100 text-slate-600 p-2.5 rounded-xl hover:bg-red-50 hover:text-red-600 transition-all border border-slate-200">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>
            </div>
        </nav>

        <main class="container mx-auto p-6 max-w-7xl flex-grow space-y-8">
            
            <section class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 border-b border-slate-200 px-8 py-5 flex justify-between items-center">
                    <h2 id="form-title" class="text-lg font-bold text-slate-800">Create New Promotion</h2>
                    <span class="text-xs text-slate-400 font-medium tracking-tighter">ID: Auto-generated</span>
                </div>
                <form id="promo-form" class="p-8 grid grid-cols-1 md:grid-cols-4 gap-6">
                    <input type="hidden" id="promo-id">
                    
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Promotion Title</label>
                        <input type="text" id="title" placeholder="เช่น ลดล้างสต็อก 50%" class="w-full border border-slate-200 bg-slate-50 px-4 py-3 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all" required>
                    </div>
                    
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Discount Code</label>
                        <input type="text" id="discount_code" placeholder="เช่น SUMMER50" class="w-full border border-slate-200 bg-slate-50 px-4 py-3 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none font-mono uppercase tracking-widest text-indigo-600">
                    </div>

                    <div class="md:col-span-1">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Start Date</label>
                        <input type="date" id="start_date" class="w-full border border-slate-200 bg-slate-50 px-4 py-3 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none">
                    </div>
                    
                    <div class="md:col-span-1">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">End Date</label>
                        <input type="date" id="end_date" class="w-full border border-slate-200 bg-slate-50 px-4 py-3 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none">
                    </div>

                    <div class="md:col-span-2 flex items-center pt-6 px-2">
                        <label class="flex items-center cursor-pointer group">
                            <input type="checkbox" id="is_active" class="sr-only peer" checked>
                            <div class="w-14 h-7 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-green-500 relative shadow-inner"></div>
                            <span class="ml-4 text-sm font-bold text-slate-600 group-hover:text-slate-900 transition-colors">เปิดใช้งานโปรโมชันนี้</span>
                        </label>
                    </div>

                    <div class="md:col-span-4">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Description / Details</label>
                        <textarea id="description" rows="3" placeholder="ระบุเงื่อนไขหรือรายละเอียดเพิ่มเติม..." class="w-full border border-slate-200 bg-slate-50 px-4 py-3 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none"></textarea>
                    </div>

                    <div class="md:col-span-4 flex gap-4 pt-4 border-t border-slate-100">
                       <button type="submit" id="btn-save" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl hover:bg-indigo-700 transition-all font-bold shadow-lg shadow-indigo-100 active:scale-95">
                           บันทึกข้อมูล
                       </button>
                       <button type="button" onclick="resetForm()" class="bg-white border border-slate-200 text-slate-500 px-6 py-4 rounded-2xl hover:bg-slate-50 hover:text-slate-800 transition-all font-medium">
                           ยกเลิก / ล้างค่า
                       </button>
                    </div>
                </form>
            </section>

            <section>
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-2xl font-black text-slate-900 tracking-tight">Active Promotions</h2>
                        <p class="text-slate-500 text-sm">รายการโปรโมชันทั้งหมดในระบบ</p>
                    </div>
                    <button onclick="fetchPromotions()" class="p-3 bg-white border border-slate-200 rounded-2xl hover:bg-indigo-50 hover:text-indigo-600 transition-all shadow-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                </div>
                
                <div id="loading" class="hidden flex flex-col items-center justify-center py-20 gap-4">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-12 w-12"></div>
                    <p class="text-slate-400 font-medium animate-pulse">กำลังเรียกข้อมูล...</p>
                </div>
                
                <div id="promo-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    </div>
            </section>
        </main>
    </div>

    <script>
        // ================= JS CONFIG: แก้ไข 2 บรรทัดนี้เท่านั้น =================
        const CONFIG_URL = 'https://lujvjowaywkyvixlyvst.supabase.co'; // เปลี่ยนเป็น URL ของคุณ
        const CONFIG_KEY = 'YOUR_SUPABASE_ANON_KEY'; // เปลี่ยนเป็น ANON KEY ของคุณ
        
        // ใช้ชื่อ 'supa' เพื่อไม่ให้ชนกับชื่อ Library 'supabase'
        const supa = supabase.createClient(CONFIG_URL, CONFIG_KEY);

        // UI Selectors
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const promoForm = document.getElementById('promo-form');
        const promoGrid = document.getElementById('promo-grid');
        const loadingDiv = document.getElementById('loading');
        const userEmailSpan = document.getElementById('user-email');
        const formTitle = document.getElementById('form-title');

        // 1. AUTH LOGIC: ตรวจสอบสถานะการเข้าสู่ระบบ
        supa.auth.onAuthStateChange((event, session) => {
            if (session) {
                loginSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                userEmailSpan.innerText = session.user.email;
                fetchPromotions();
            } else {
                loginSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
            }
        });

        // 2. SIGN IN: จัดการการล็อกอิน
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('btn-login');

            btn.disabled = true;
            btn.innerText = "Processing...";
            loginError.classList.add('hidden');

            const { data, error } = await supa.auth.signInWithPassword({ email, password });

            if (error) {
                loginError.innerText = "ล็อกอินไม่สำเร็จ: " + error.message;
                loginError.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "Sign In to System";
            }
        });

        // 3. LOGOUT: ออกจากระบบ
        async function handleLogout() {
            await supa.auth.signOut();
            window.location.reload();
        }

        // 4. READ: ดึงข้อมูลโปรโมชัน
        async function fetchPromotions() {
            loadingDiv.classList.remove('hidden');
            promoGrid.innerHTML = '';
            
            const { data, error } = await supa
                .from('promotions')
                .select('*')
                .order('created_at', { ascending: false });

            loadingDiv.classList.add('hidden');
            if (error) return alert('เกิดข้อผิดพลาด: ' + error.message);

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col";
                
                const statusBadge = item.is_active 
                    ? '<span class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Active</span>'
                    : '<span class="bg-slate-100 text-slate-400 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Inactive</span>';

                card.innerHTML = `
                    <div class="p-6 flex-grow">
                        <div class="flex justify-between items-start mb-4">
                            ${statusBadge}
                            <div class="flex gap-2">
                                <button onclick="editPromo('${item.id}')" class="p-2 text-indigo-500 hover:bg-indigo-50 rounded-xl transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                </button>
                                <button onclick="deletePromo('${item.id}')" class="p-2 text-red-400 hover:bg-red-50 rounded-xl transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                        </div>
                        <h3 class="font-bold text-slate-900 text-xl mb-2 leading-tight">${item.title}</h3>
                        ${item.discount_code ? `<p class="font-mono text-indigo-600 font-black text-sm mb-3 bg-indigo-50 inline-block px-3 py-1 rounded-lg">${item.discount_code}</p>` : ''}
                        <p class="text-slate-500 text-sm line-clamp-3 leading-relaxed mb-4">${item.description || 'ไม่มีรายละเอียด...'}</p>
                    </div>
                    <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-between items-center text-[11px] font-bold text-slate-400 uppercase tracking-tighter">
                        <div>📅 ${item.start_date || 'N/A'}</div>
                        <div>🏁 ${item.end_date || 'N/A'}</div>
                    </div>
                `;
                promoGrid.appendChild(card);
            });
        }

        // 5. CREATE & UPDATE: บันทึกข้อมูล
        promoForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            const id = document.getElementById('promo-id').value;
            
            const payload = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                discount_code: document.getElementById('discount_code').value.toUpperCase(),
                start_date: document.getElementById('start_date').value || null,
                end_date: document.getElementById('end_date').value || null,
                is_active: document.getElementById('is_active').checked
            };

            btn.disabled = true;
            btn.innerText = "กำลังบันทึก...";

            let result;
            if (id) {
                // UPDATE (SQL: update promotions where id = id)
                result = await supa.from('promotions').update(payload).eq('id', id);
            } else {
                // INSERT (SQL: insert into promotions)
                result = await supa.from('promotions').insert([payload]);
            }

            if (result.error) {
                alert('บันทึกผิดพลาด: ' + result.error.message);
            } else {
                resetForm();
                fetchPromotions();
            }
            btn.disabled = false;
            btn.innerText = "บันทึกข้อมูล";
        });

        // 6. DELETE: ลบข้อมูล
        async function deletePromo(id) {
            if (!confirm('คุณต้องการลบโปรโมชันนี้ใช่หรือไม่? ข้อมูลจะหายถาวร')) return;
            const { error } = await supa.from('promotions').delete().eq('id', id);
            if (error) alert('ลบผิดพลาด: ' + error.message);
            else fetchPromotions();
        }

        // 7. EDIT: ดึงข้อมูลขึ้นฟอร์มเพื่อแก้ไข
        async function editPromo(id) {
            const { data, error } = await supa.from('promotions').select('*').eq('id', id).single();
            if (data) {
                document.getElementById('promo-id').value = data.id;
                document.getElementById('title').value = data.title;
                document.getElementById('description').value = data.description;
                document.getElementById('discount_code').value = data.discount_code;
                document.getElementById('start_date').value = data.start_date;
                document.getElementById('end_date').value = data.end_date;
                document.getElementById('is_active').checked = data.is_active;
                
                formTitle.innerText = "Editing Promotion: " + data.title;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function resetForm() {
            promoForm.reset();
            document.getElementById('promo-id').value = '';
            document.getElementById('is_active').checked = true;
            formTitle.innerText = "Create New Promotion";
        }
    </script>
</body>
</html>
